# Production-ready Docker Compose file for FMS Deployment

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "443:443"
      - "80:80"
      - "8443:443"
    volumes:
      - ./nginx_conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx_conf/00-log-format.conf:/etc/nginx/conf.d/00-log-format.conf:ro
      - ./nginx_conf/snippets:/etc/nginx/snippets:ro
      - ./certs/nginx:/etc/nginx/certs:ro
      - ./certs/internal/ca.crt:/etc/nginx/ca/ca.crt:ro
      - nginx_logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
      # - fms_logos:/app/static/logos:ro # Mount the shared logos volume
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - application-service
      - user-service
      - device-core
      - mission-service
      - deployment-service
      - dashboard-service
      - traffic-management-service
      - alert-service
      - analytics-service
      - fmscore-frontend
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - fmsnet

  application-service:
    image: fms-application-service:fms-1.1
    container_name: application-service
    volumes:
      - ./certs/internal/application-service.crt:/etc/service-certs/cert.crt:ro
      - ./certs/internal/application-service.key:/etc/service-certs/cert.key:ro
      - $HOME/FMS-localstorage/app-icons:/app/uploads/app-icons
    environment:
      - NODE_ENV=production
      - PORT=8003
      - DATABASE_URL=postgresql://admin:password@host.docker.internal:5432/applications
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=applications
      - SECRET_KEY=Gy8-9R8myuWWxZjibPS63oXYrG_Zq9RmepKIRRUr91o
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - MQTT_BROKER_HOST=localhost
      - MQTT_BROKER_PORT=1883
      - API_STR=/api
      - BACKEND_CORS_ORIGINS=https://localhost:8443
      - UPLOAD_DIRECTORY=/app/uploads/app-icons
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - fmsnet

  user-service:
    image: fms-user-service:fms-1.1 # <-- Added image name
    container_name: user-service
    # network_mode: "host"
    volumes:
      - ./certs/internal/user-service.crt:/etc/service-certs/cert.crt:ro
      - ./certs/internal/user-service.key:/etc/service-certs/cert.key:ro
      - $HOME/Temporary-Folder:/app/shared
      - $HOME/FMS-localstorage/logos:/app/uploads
      - $HOME/FMS-localstorage/license:/app/license
      - /sys:/sys:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MONGODB_URL=mongodb://admin:password@host.docker.internal:27017/admin
      - MONGODB_DATABASE=iotcore_usermanagement
      - ACCESS_TOKEN_EXPIRE_MINUTES=5
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","https://localhost:8443","https://neev3.trizlabz.com:8443"]
      - COOKIE_NAME=jwt
      - LICENSE_FILE_PATH=/app/license/license.lic
      - ENABLE_LOGGING=true
    command: ["npm", "start"]
    restart: unless-stopped
    networks:
      - fmsnet

  device-core:
    image: fms-device-core:fms-1.1
    container_name: device-core
    user: root
    volumes:
      - ./certs/internal/device-core.crt:/etc/service-certs/cert.crt:ro
      - ./certs/internal/device-core.key:/etc/service-certs/cert.key:ro
      - $HOME/FMS-localstorage/license:/app/license:ro
      - /sys:/sys:ro
      # Mount MQTT certs from a standardized location
      - ./certs/mqtt/ca.crt:/etc/mqtt-certs/ca.crt:ro
      - ./certs/mqtt/client.crt:/etc/mqtt-certs/client.crt:ro
      - ./certs/mqtt/client.key:/etc/mqtt-certs/client.key:ro
    environment:
      - PORT=8004
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://admin:password@host.docker.internal:5432/devices
      - DB_SYNCHRONIZE=false
      - INFLUX_URL=http://host.docker.internal:8086
      - INFLUX_TOKEN=tovrpN8MZ2RbzDDViK5WEGS77u7VqtAQvVEuEQ8RxHig8q373j3sPXkLOqfmRgrrpwWj-V8Uaj60qzlPAvaSFA==
      - INFLUX_ORG=trizlabz
      - INFLUX_BUCKET=device_core
      - KAFKA_BROKERS=host.docker.internal:9092
      - KAFKA_BROKERS_JSON=["host.docker.internal:9092"]
      - KAFKA_CLIENT_ID=device-telemetry-service
      - KAFKA_GROUP_ID=device-telemetry-group
      - KAFKAJS_NO_PARTITIONER_WARNING=1
      - TYPEORM_ENTITIES=dist/models/**/*.js
      - TYPEORM_MIGRATIONS=dist/migrations/**/*.js
      - LICENSE_PATH=/app/license/license.lic
      - DEPLOYMENT_TYPE=${DEPLOYMENT_TYPE:-ON_PREM}
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","https://localhost:8443","https://192.168.147.208:8443","https://neev3.trizlabz.com:8443"]
      # --- ✅ ADDED FOR HTTPS ---
      - ENABLE_HTTPS=true
      - SSL_CERT_PATH=/etc/service-certs/cert.crt
      - SSL_KEY_PATH=/etc/service-certs/cert.key
      - MQTT_BROKER_HOST=10.122.73.4
      - MQTT_CA_CERT_PATH=/etc/mqtt-certs/ca.crt
      - MQTT_CLIENT_CERT_PATH=/etc/mqtt-certs/client.crt
      - MQTT_CLIENT_KEY_PATH=/etc/mqtt-certs/client.key
      - ENABLE_LOGGING=true # Master switch to enable/disable all logging
      - LOG_LEVEL=info # Log level: error, warn, info, http, debug
      - LOG_FORMAT=simple # Log format: simple (default), json
      - NODE_ENV=development # Environment: development, production
      - ENABLE_FILE_LOGGING=false # Enable file-based logging (auto-enabled in production)
      - LOG_FILE_MAX_SIZE=20m # Maximum size per log file
      - LOG_FILE_MAX_FILES=14d # Log retention period
      - SHOW_LOG_FILE_NAME=false # Show log file name in logs (optional)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/server.js"]
    restart: unless-stopped
    networks:
      - fmsnet

  mission-service:
    image: fms-mission-service:fms-1.1
    container_name: mission-service
    user: root
    command: ["node", "dist/index.js"]
    ports:
      - "8005:8005"
    volumes:
      - ./certs/internal/mission-service.crt:/etc/service-certs/cert.crt:ro
      - ./certs/internal/mission-service.key:/etc/service-certs/cert.key:ro
    environment:
      - DATABASE_URL=postgresql://admin:password@host.docker.internal:5432/missions
      - CORS_ORIGIN=["http://localhost:5173","http://localhost:3000","https://localhost:8443","https://192.168.147.208:8443","https://neev3.trizlabz.com:8443"]
      # --- ✅ ADDED FOR HTTPS ---
      - PORT=8005
      - ENABLE_HTTPS=true
      - SSL_CERT_PATH=/etc/service-certs/cert.crt
      - SSL_KEY_PATH=/etc/service-certs/cert.key
      - SHADOW_DATABASE_URL=postgres://admin:password@host.docker.internal:5432/missions
      - HISTORY_API=http://log-service:8011/api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - fmsnet

  deployment-service:
    image: fms-deployment-service:fms-1.1
    container_name: deployment-service
    user: root

    volumes:
      - ./certs/internal/deployment-service.crt:/etc/service-certs/cert.crt:ro
      - ./certs/internal/deployment-service.key:/etc/service-certs/cert.key:ro
      - $HOME/FMS-localstorage/zone_map:/app/uploads/maps
      - $HOME/FMS-localstorage/plant_image:/app/uploads/plant-image
      - $HOME/FMS-localstorage/zone_image:/app/uploads/zone-image
      - $HOME/FMS-localstorage/map_yaml:/app/uploads/configs
      - $HOME/FMS-localstorage/zones:/app/uploads/zones
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8006
      - DATABASE_URL=postgresql://admin:password@host.docker.internal:5432/deployment
      - ZONE_STORAGE_PATH=/app/uploads/zones
      - MAP_STORAGE_PATH=/app/uploads/maps
      - CONFIG_STORAGE_PATH=/app/uploads/configs
      - PLANT_IMAGE_STORAGE_PATH=/app/uploads/plant-image
      - ZONE_IMAGE_STORAGE_PATH=/app/uploads/zone-image
      - DB_SYNCHRONIZE=false
      - NODE_ENV=development
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","https://localhost:8443","https://192.168.147.208:8443","https://neev3.trizlabz.com:8443"]
      # --- ✅ ADDED FOR HTTPS ---
      - ENABLE_HTTPS=true
      - SSL_CERT_PATH=/etc/service-certs/cert.crt
      - SSL_KEY_PATH=/etc/service-certs/cert.key
    restart: unless-stopped
    networks:
      - fmsnet

  dashboard-service:
    image: fms-dashboard-service:fms-1.1
    container_name: dashboard-service
    ports:
      - "8007:8007"
    user: root
    volumes:
      - ./certs/internal/dashboard-service.crt:/etc/service-certs/cert.crt:ro
      - ./certs/internal/dashboard-service.key:/etc/service-certs/cert.key:ro
    environment:
      - DATABASE_URL=postgresql://admin:password@host.docker.internal:5432/dashboard
      - PORT=8007
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","https://localhost:8443","https://192.168.147.208:8443","https://neev3.trizlabz.com:8443"]
      # --- ✅ ADDED FOR HTTPS ---
      - ENABLE_HTTPS=true
      - SSL_CERT_PATH=/etc/service-certs/cert.crt
      - SSL_KEY_PATH=/etc/service-certs/cert.key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - fmsnet

  alert-service:
    image: fms-alert-service:fms-1.1
    container_name: alert-service
    ports:
      - "8008:8008"
    volumes:
      - ./certs/internal/alert-service.crt:/etc/service-certs/cert.crt:ro
      - ./certs/internal/alert-service.key:/etc/service-certs/cert.key:ro
    environment:
      - NODE_ENV=production
      - PORT=8008
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=password
      - DB_NAME=alerts_db
      - KAFKA_BROKERS=host.docker.internal:9092
      - KAFKA_DEVICE_METRICS_TOPIC=device-telemetry
      - KAFKA_TOPIC_ALERTS=device-telemetry
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","https://localhost:8443","https://192.168.147.208:8443","https://neev3.trizlabz.com:8443"]
      # --- ✅ ADDED FOR HTTPS ---
      - ENABLE_HTTPS=false
      - SSL_CERT_PATH=/etc/service-certs/cert.crt
      - SSL_KEY_PATH=/etc/service-certs/cert.key
      - APPLICATION_SERVICE_URL=http://application-service:8003
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - fmsnet

  traffic-management-service:
    image: fms-traffic-management-service:fms-1.1
    container_name: traffic-management-service
    user: root
    ports:
      - "8009:8009"
    volumes:
      - ./certs/internal/traffic-management-service.crt:/etc/service-certs/cert.crt:ro
      - ./certs/internal/traffic-management-service.key:/etc/service-certs/cert.key:ro
      - $HOME/FMS-localstorage/license:/app/license:ro
      - /sys:/sys:ro
    environment:
      - NODE_ENV=production
      - PORT=8009
      - DATABASE_URL=postgresql://admin:password@host.docker.internal:5432/traffic_management
      - KAFKA_BROKERS=host.docker.internal:9092
      - KAFKA_CLIENT_ID=traffic-management-service
      - KAFKA_GROUP_ID=traffic-management-group
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","https://localhost:8443","https://192.168.147.208:8443","https://neev3.trizlabz.com:8443"]
      - FMS_MISSION_SERVICE_URL=https://mission-service:8005
      - FMS_DEVICE_CORE_URL=https://device-core:8004
      - DEPLOYMENT_SERVICE_URL=https://deployment-service:8006/api
      - PG_HOST=host.docker.internal
      - PG_PORT=5432
      - PG_USER=admin
      - PG_PASSWORD=password
      - PG_DATABASE=traffic_management
      - ENABLE_PATH_RESERVATION=false
      # --- ✅ ADDED FOR HTTPS ---
      - ENABLE_HTTPS=true
      - SSL_CERT_PATH=/etc/service-certs/cert.crt
      - SSL_KEY_PATH=/etc/service-certs/cert.key
      - LICENSE_PATH=/app/license/license.lic
      - DEPLOYMENT_TYPE=${DEPLOYMENT_TYPE:-ON_PREM}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - fmsnet

  analytics-service:
    image: fms-analytics-service:fms-1.1
    container_name: analytics-service
    ports:
      - "8010:8010"
    volumes:
      - ./certs/internal/analytics-service.crt:/etc/service-certs/cert.crt:ro
      - ./certs/internal/analytics-service.key:/etc/service-certs/cert.key:ro  
    environment:
      - TZ=Asia/Kolkata
      - DATABASE_URL=postgresql://admin:password@host.docker.internal:5432/traffic_management?schema=public
      - CORS_ORIGIN=["http://localhost:5173","http://localhost:3000","https://localhost:8443","https://192.168.147.208:8443","https://neev3.trizlabz.com:8443"]
      - ENABLE_HTTPS=true
      - SSL_CERT_PATH=/etc/service-certs/cert.crt
      - SSL_KEY_PATH=/etc/service-certs/cert.key
      - DEBUG=prisma:*
      - PRISMA_LOG_LEVEL=info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - fmsnet

  log-service:
    image: fms-log-service:fms-1.1
    container_name: log-service
    ports:
      - "8011:8011"
    volumes:
      - ./certs/internal/log-service.crt:/etc/service-certs/cert.crt:ro
      - ./certs/internal/log-service.key:/etc/service-certs/cert.key:ro
    environment:
      - NODE_ENV=production
      - PORT=8011
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=password
      - DB_DATABASE=fms_history_db
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","https://localhost:8443","https://192.168.147.208:8443","https://neev3.trizlabz.com:8443"]
      - ENABLE_HTTPS=true
      - SSL_CERT_PATH=/etc/service-certs/cert.crt
      - SSL_KEY_PATH=/etc/service-certs/cert.key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - fmsnet

  fmscore-frontend:
    image: fmscore-frontend:fms-1.1
    container_name: fmscore-frontend
    environment:
      - INFLUX_URL=http://10.122.73.4:8086
      - INFLUX_TOKEN=tovrpN8MZ2RbzDDViK5WEGS77u7VqtAQvVEuEQ8RxHig8q373j3sPXkLOqfmRgrrpwWj-V8Uaj60qzlPAvaSFA==
      - INFLUX_ORG=trizlabz
    restart: unless-stopped
    networks:
      - fmsnet

  db-manager:
    image: fms-db-manager:fms-1.1
    container_name: db-manager
    ports:
      - "8012:8012"
    environment:
      - PORT=8012
      - INFLUX_URL=http://host.docker.internal:8086
      - INFLUX_TOKEN=tovrpN8MZ2RbzDDViK5WEGS77u7VqtAQvVEuEQ8RxHig8q373j3sPXkLOqfmRgrrpwWj-V8Uaj60qzlPAvaSFA==
      - INFLUX_ORG=trizlabz
      - INFLUX_BUCKET=device_core
      - DATABASE_DEVICES_URL=postgresql://admin:password@host.docker.internal:5432/devices
      - DATABASE_TRAFFIC_URL=postgresql://admin:password@host.docker.internal:5432/traffic_management
      - DATABASE_ALERTS_URL=postgresql://admin:password@host.docker.internal:5432/alerts_db
      - DATABASE_APPLICATIONS_URL=postgresql://admin:password@host.docker.internal:5432/applications
      - DATABASE_DASHBOARD_URL=postgresql://admin:password@host.docker.internal:5432/dashboard
      - DATABASE_DEPLOYMENT_URL=postgresql://admin:password@host.docker.internal:5432/deployment
      - DATABASE_MISSIONS_URL=postgresql://admin:password@host.docker.internal:5432/missions
      - DATABASE_OTA_SERVICE_URL=postgresql://admin:password@host.docker.internal:5432/ota_service
      - DATABASE_CLEANUP_HISTORY_URL=postgresql://admin:password@host.docker.internal:5432/fms_history_db
      - MONGODB_URL=mongodb://admin:password@host.docker.internal:27017/?authSource=admin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - fmsnet

  ota-update-service:
    image: fms-ota-update-service:fms-1.1
    container_name: ota-update-service
    ports:
      - "8013:8013"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Need docker socket for managing containers
      - $HOME/FMS-localstorage/updates:/app/uploads
    environment:
      - PORT=8013
      - DATABASE_URL=postgresql://admin:password@host.docker.internal:5432/ota_service
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=password
      - DB_NAME=ota_service
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
      - UPLOAD_DIR=/app/uploads
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","https://localhost:8443","https://192.168.147.208:8443","https://neev3.trizlabz.com:8443"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - fmsnet

volumes:
  nginx_cache:
  nginx_logs:

networks:
  fmsnet:
    driver: bridge
